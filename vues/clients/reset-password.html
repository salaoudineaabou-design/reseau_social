<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Réinitialiser le mot de passe - Réseau Social</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-box">
    <h1>Nouveau mot de passe</h1>
    <p class="subtitle">Choisissez un nouveau mot de passe</p>
    <form id="resetForm">
      <div class="form-group">
        <label>Nouveau mot de passe</label>
        <input type="password" id="password" minlength="6" required>
      </div>
      <p id="msg" class="hidden"></p>
      <button type="submit" class="btn">Réinitialiser</button>
    </form>
    <div class="link-row"><a href="login.html">&larr; Retour à la connexion</a></div>
  </div>
</div>
<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/auth.js"></script>
</body>
</html>
