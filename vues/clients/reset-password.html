<div class="auth-container">
  <div class="auth-card">
    <h2>Nouveau mot de passe</h2>
    <div id="reset-error"></div>
    <div id="reset-success"></div>

    <div id="reset-form-zone">
      <div class="form-group">
        <label for="reset-password">Nouveau mot de passe</label>
        <input type="password" id="reset-password" placeholder="8 caractères minimum">
      </div>
      <div class="form-group">
        <label for="reset-password-confirm">Confirmer le mot de passe</label>
        <input type="password" id="reset-password-confirm" placeholder="Retape le même mot de passe">
      </div>

      <button class="btn-primary" id="btn-reset">Changer le mot de passe</button>
    </div>

    <div class="auth-switch">
      <a href="#" data-vue="login">Retour à la connexion</a>
    </div>
  </div>
</div>
