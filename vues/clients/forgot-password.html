<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mot de passe oublié - Réseau Social</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-box">
    <h1>Mot de passe oublié</h1>
    <p class="subtitle">Saisissez votre email pour recevoir un lien de réinitialisation</p>
    <form id="forgotForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required>
      </div>
      <p id="msg" class="hidden"></p>
      <button type="submit" class="btn">Envoyer le lien</button>
    </form>
    <div class="link-row"><a href="login.html">&larr; Retour à la connexion</a></div>
  </div>
</div>
<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/auth.js"></script>
</body>
</html>
