<h2 style="margin-bottom:1rem;">Messages</h2>

<div class="chat-conteneur">
  <div class="chat-sidebar">
    <div class="chat-sidebar-header">
      <input type="text" id="recherche-conv" placeholder="Rechercher...">
    </div>
    <div id="liste-conversations">
      <p class="chargement" style="padding:1rem;">Chargement...</p>
    </div>
  </div>

  <div class="chat-zone">
    <div id="chat-vide" class="chat-vide">Sélectionne une conversation pour commencer à discuter.</div>

    <div id="zone-chat-active" style="display:none;flex-direction:column;height:100%;">
      <div class="chat-entete" id="chat-entete"></div>
      <div id="zone-messages"></div>
      <div class="chat-saisie">
        <label for="input-image-message" class="btn-piece-jointe" title="Envoyer une image">📎</label>
        <input type="file" id="input-image-message" accept="image/jpeg,image/png,image/gif,image/webp" style="display:none;">
        <input type="text" id="input-message" placeholder="Écris un message..." maxlength="1000">
        <button id="btn-envoyer-message">Envoyer</button>
      </div>
    </div>
  </div>
</div>
