<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Vérification de l'email - Réseau Social</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-box" style="text-align:center;">
    <h1>Vérification</h1>
    <p id="msg" class="subtitle">Vérification en cours...</p>
    <a href="login.html" class="btn">Aller à la connexion</a>
  </div>
</div>
<script src="../../assets/js/api.js"></script>
<script>
(async () => {
  const token = new URLSearchParams(window.location.search).get('token');
  const res = await apiCall('verify_email.php?token=' + token);
  document.getElementById('msg').textContent = res.message;
})();
</script>
</body>
</html>
