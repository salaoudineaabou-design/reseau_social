<div class="auth-container">
  <div class="auth-card">
    <h2>Créer un compte</h2>
    <div id="register-error"></div>
    <div id="register-success"></div>

    <div class="form-group">
      <label for="register-prenom">Prénom</label>
      <input type="text" id="register-prenom" placeholder="Alice">
    </div>
    <div class="form-group">
      <label for="register-nom">Nom</label>
      <input type="text" id="register-nom" placeholder="Dupont">
    </div>
    <div class="form-group">
      <label for="register-email">Email</label>
      <input type="email" id="register-email" placeholder="ton@email.com" autocomplete="username">
    </div>
    <div class="form-group">
      <label for="register-password">Mot de passe</label>
      <input type="password" id="register-password" placeholder="8 caractères minimum" autocomplete="new-password">
    </div>

    <button class="btn-primary" id="btn-register">S'inscrire</button>

    <div class="auth-switch">
      Déjà un compte ? <a href="#" data-vue="login">Se connecter</a>
    </div>
  </div>
</div>
