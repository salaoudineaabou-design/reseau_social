<div class="auth-container">
  <div class="auth-card">
    <h2>Connexion</h2>
    <div id="login-error"></div>
    <div id="login-success"></div>

    <div class="form-group">
      <label for="login-email">Email</label>
      <input type="email" id="login-email" placeholder="ton@email.com" autocomplete="username">
    </div>
    <div class="form-group">
      <label for="login-password">Mot de passe</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-primary" id="btn-login">Se connecter</button>

    <div class="auth-switch">
      <a href="#" data-vue="forgot">Mot de passe oublié ?</a>
    </div>
    <div class="auth-switch">
      Pas encore de compte ? <a href="#" data-vue="register">S'inscrire</a>
    </div>
    <div class="auth-switch" style="margin-top:1.5rem;">
      <a href="#" data-vue="admin-login" style="color:var(--couleur-gris);">Accès back-office</a>
    </div>
  </div>
</div>
