<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Utilisateurs - Back-Office</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
<div class="admin-layout">
  <div class="admin-sidebar" id="adminSidebar"></div>
  <div class="admin-content">
    <h2>Gestion des utilisateurs</h2>
    <div class="card">
      <table class="admin-table">
        <thead><tr><th>Avatar</th><th>Nom</th><th>Email</th><th>Rôle</th><th>Statut</th><th>Inscrit le</th><th>Actions</th></tr></thead>
        <tbody id="usersBody"></tbody>
      </table>
    </div>
  </div>
</div>
<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/admin.js"></script>
<script>
const me = requireStaffLogin();
renderAdminSidebar('utilisateurs.html');

async function loadUsers() {
  const res = await apiCall('admin_get_users.php');
  const tbody = document.getElementById('usersBody');
  if (!res.success) return;
  tbody.innerHTML = res.users.map(u => {
    const canManage = me.role === 'admin' || u.role === 'user';
    return `<tr>
      <td><img src="../../${u.avatar}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;"></td>
      <td>${escapeHtml(u.prenom)} ${escapeHtml(u.nom)}</td>
      <td>${escapeHtml(u.email)}</td>
      <td><span class="badge ${u.role}">${u.role}</span></td>
      <td><span class="badge ${u.status}">${u.status}</span></td>
      <td>${u.created_at}</td>
      <td>
        ${canManage ? `
          <button class="btn small ${u.status === 'actif' ? 'danger' : ''}" data-action="ban" data-id="${u.id}" data-status="${u.status}">
            ${u.status === 'actif' ? 'Bannir' : 'Réactiver'}
          </button>
          <button class="btn small danger" data-action="delete" data-id="${u.id}">Supprimer</button>
        ` : '<span style="color:#999;">Réservé admin</span>'}
      </td>
    </tr>`;
  }).join('');

  tbody.querySelectorAll('[data-action="ban"]').forEach(btn => btn.onclick = async () => {
    const action = btn.dataset.status === 'actif' ? 'ban' : 'unban';
    await apiCall('admin_ban_user.php', 'POST', { id: Number(btn.dataset.id), action });
    loadUsers();
  });
  tbody.querySelectorAll('[data-action="delete"]').forEach(btn => btn.onclick = async () => {
    if (!confirm('Supprimer définitivement cet utilisateur ?')) return;
    await apiCall('admin_delete_user.php', 'POST', { id: Number(btn.dataset.id) });
    loadUsers();
  });
}
loadUsers();
</script>
</body>
</html>
