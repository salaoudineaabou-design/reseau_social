<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Back-Office - Réseau Social</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
<div class="auth-wrapper" style="background:linear-gradient(135deg,#1c1e21,#3a3d42);">
  <div class="auth-box">
    <h1>Back-Office</h1>
    <p class="subtitle">Accès réservé aux administrateurs et modérateurs</p>
    <form id="adminLoginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="password" required>
      </div>
      <p id="msg" class="hidden"></p>
      <button type="submit" class="btn">Se connecter</button>
    </form>
  </div>
</div>
<script src="../../assets/js/api.js"></script>
<script>
document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('msg');
  const payload = {
    email: document.getElementById('email').value,
    password: document.getElementById('password').value,
  };
  const res = await apiCall('admin_login.php', 'POST', payload);
  if (res.success) {
    Session.setToken(res.session_token);
    Session.setUser(res.user);
    window.location.href = 'dashboard.html';
  } else {
    msg.textContent = res.message;
    msg.className = 'error-msg';
  }
});
</script>
</body>
</html>
