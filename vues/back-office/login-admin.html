<div class="auth-container">
  <div class="auth-card">
    <h2>Back-office</h2>
    <p style="color:var(--couleur-gris);font-size:0.85rem;margin-bottom:1rem;">
      Accès réservé aux administrateurs et modérateurs.
    </p>
    <div id="admin-login-error"></div>

    <div class="form-group">
      <label for="admin-email">Email</label>
      <input type="email" id="admin-email" placeholder="admin@test.com">
    </div>
    <div class="form-group">
      <label for="admin-password">Mot de passe</label>
      <input type="password" id="admin-password" placeholder="••••••••">
    </div>

    <button class="btn-primary" id="btn-admin-login">Se connecter</button>

    <div class="auth-switch">
      <a href="#" data-vue="login">← Retour au site</a>
    </div>
  </div>
</div>
