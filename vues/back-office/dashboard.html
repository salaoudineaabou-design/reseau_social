<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Tableau de bord - Back-Office</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
<div class="admin-layout">
  <div class="admin-sidebar" id="adminSidebar"></div>
  <div class="admin-content">
    <h2>Tableau de bord</h2>
    <div class="stat-grid" id="statGrid"></div>
    <div class="card">
      <h3>Inscriptions - 7 derniers jours</h3>
      <table class="admin-table" id="inscriptionsTable"><tbody></tbody></table>
    </div>
  </div>
</div>
<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/admin.js"></script>
<script>
const user = requireStaffLogin();
renderAdminSidebar('dashboard.html');

(async () => {
  const res = await apiCall('admin_get_stats.php');
  if (!res.success) return;
  const s = res.stats;
  const cards = [
    ['Utilisateurs', s.total_users],
    ['Articles', s.total_posts],
    ['Commentaires', s.total_comments],
    ['Messages échangés', s.total_messages],
    ['Modérateurs', s.total_moderateurs],
    ['Administrateurs', s.total_admins],
    ['Comptes bannis', s.users_bannis],
    ['Inscriptions (7j)', s.inscriptions_7j],
  ];
  document.getElementById('statGrid').innerHTML = cards.map(([label, num]) =>
    `<div class="stat-card"><div class="num">${num}</div><div class="label">${label}</div></div>`
  ).join('');

  const tbody = document.querySelector('#inscriptionsTable tbody');
  tbody.innerHTML = s.inscriptions_par_jour.length
    ? s.inscriptions_par_jour.map(row => `<tr><td>${row.jour}</td><td>${row.total} inscription(s)</td></tr>`).join('')
    : '<tr><td>Aucune donnée sur cette période.</td></tr>';
})();
</script>
</body>
</html>
